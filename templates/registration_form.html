<section id="contact" class="list-spectre">
  <div class="col-12 col-lg-8 px-0 pb-5">
  <div class="card">

    <div class="card-header">
      <h2 class="mb-0">Pre-Register</h2>
    </div>
    <p>Please use the form to reserve a seat in a course. I will get in touch with the paperwork.</p>

    <div class="card-body">

      <form method="POST" action="/api/contact">

        <div class="row mb-3">
          <label for="name" class="col-sm-3 col-form-label">Your name</label>
          <div class="col-sm-9">
            <input type="text" class="form-control" id="name" name="name" placeholder="Your Name" required>
          </div>
        </div>

        <div class="row mb-3">
          <label for="course" class="col-sm-3 col-form-label">Course</label>
          <div class="col-sm-9">
            <select class="form-select" id="course" name="course" required>
              <option value="" disabled selected>Select a course date</option>
              <option value="2d-game-programming-2026-06">2D Game Programming with Python – 03.06. - 24.06.2026</option>
              <option value="polars-2026-08">polars for Data Analysis – 31.08. - 2.09.2026</option>
              <option value="advanced-python-2026-08">Advanced Python – 21.08. - 9.10.2026 (Fridays 8-10)</option>
              <option value="art-numpy-2026-08">Art with NumPy – 21.08. - 9.10.2026 (Fridays 15-18)</option>
            </select>
          </div>
        </div>

        <div class="row mb-3">
          <label for="email" class="col-sm-3 col-form-label">Your email <span class="text-muted">(optional)</span></label>
          <div class="col-sm-9">
            <input type="email" class="form-control" id="email" name="email" placeholder="my@email.eu">
          </div>
        </div>

        <div class="row mb-3">
          <label for="message" class="col-sm-3 col-form-label">Why are you interested in this course?</label>
          <div class="col-sm-9">
            <textarea class="form-control" id="message" name="message" rows="3" placeholder="I want to become more confident in ..." required></textarea>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-sm-9 offset-sm-3">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="privacy" name="privacy" required>
              <label class="form-check-label" for="privacy">
                I have read and understood the
                <a href="#" data-bs-toggle="modal" data-bs-target="#privacyModal">data privacy statement</a>.
              </label>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-9 offset-sm-3">
            <button type="submit" class="btn btn-primary">Send message</button>
          </div>
        </div>

      </form>
    </div>
  </div>
  </div>
</section>

{% include('form_modals.html') %}
